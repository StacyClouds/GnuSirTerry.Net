on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dotnet-version: '9.0.x'
            tfm: net9.0
            sdk-min: '9.0.100'
          - dotnet-version: '10.0.x'
            tfm: net10.0
            sdk-min: '10.0.100'
          - dotnet-version: '11.0.x'
            tfm: net11.0
            sdk-min: '11.0.100'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 
            9.0.x
            10.0.x
            11.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore StacyClouds.GnuSirTerry.Net.Tests/StacyClouds.GnuSirTerry.Net.Tests.csproj
        
      - name: Build
        run: dotnet build StacyClouds.GnuSirTerry.Net.Tests/StacyClouds.GnuSirTerry.Net.Tests.csproj --no-restore --configuration Release
        
      - name: Test
        run: dotnet test StacyClouds.GnuSirTerry.Net.Tests/StacyClouds.GnuSirTerry.Net.Tests.csproj --no-build --configuration Release --framework ${{ matrix.tfm }}
